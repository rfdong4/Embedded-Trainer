id: embedded_rust_ownership_transfer
topic_id: embedded_rust
title: "Ownership Transfer Simulation"
difficulty: intermediate
description: |
  Simulate Rust's ownership model in C. A resource can only have one owner
  at a time. When ownership is transferred (moved), the previous owner
  becomes invalid.

  Implement an ownership system using a Resource struct:

  typedef struct {
      int value;
      int valid;   // 1 = owned/valid, 0 = moved/invalid
  } Resource;

  Functions:
  - resource_create: Initialize a Resource with a value and valid=1
  - resource_move: Transfer ownership from src to dst. After the move,
    src->valid becomes 0 and dst gets src's value with valid=1.
    Returns 1 on success, 0 if src is already invalid.
  - resource_read: Return the value if valid, or -1 if invalid (moved).

  This simulates how Rust prevents use-after-move at compile time.
function_signature: |
  void resource_create(Resource *r, int value);
  int resource_move(Resource *src, Resource *dst);
  int resource_read(const Resource *r);
