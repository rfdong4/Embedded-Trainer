solution: |
  #include <stdint.h>

  /* Simulates Rust's ownership/move semantics:
   * - Each value has exactly one owner
   * - When ownership is transferred (moved), the source becomes invalid
   * - Rust enforces this at compile time; here we check at runtime */

  typedef struct {
      int value;
      int valid;
  } Resource;

  void resource_create(Resource *r, int value) {
      r->value = value;
      r->valid = 1;
  }

  int resource_move(Resource *src, Resource *dst) {
      if (!src->valid) return 0;
      dst->value = src->value;
      dst->valid = 1;
      src->valid = 0;
      return 1;
  }

  int resource_read(const Resource *r) {
      if (!r->valid) return -1;
      return r->value;
  }
solution_explanation: |
  This simulates Rust's move semantics. In Rust, after 'let b = a;', the variable
  'a' is no longer usable. The compiler tracks ownership and prevents use-after-move
  at compile time. In this C simulation, we use a 'valid' flag to track ownership
  at runtime, returning an error when reading a moved resource.
