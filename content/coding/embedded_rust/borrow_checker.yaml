  - "borrow_immutable must check that mutable_active == 0"
xp: 50
time_limit: 5
solution: |
  #include <stdint.h>

  /* Simulates Rust's borrow checker:
   * - Multiple immutable borrows (&T) are allowed simultaneously
   * - Only one mutable borrow (&mut T) is allowed, with no other borrows
   * - Rust enforces this at compile time; here we check at runtime */

  typedef struct {
      int immutable_count;
      int mutable_active;
  } BorrowState;

  void borrow_init(BorrowState *state) {
      state->immutable_count = 0;
      state->mutable_active = 0;
  }

  int borrow_immutable(BorrowState *state) {
      if (state->mutable_active) return 0;
      state->immutable_count++;
      return 1;
  }

  int borrow_mutable(BorrowState *state) {
      if (state->immutable_count > 0 || state->mutable_active) return 0;
      state->mutable_active = 1;
      return 1;
  }

  int release_immutable(BorrowState *state) {
      if (state->immutable_count <= 0) return 0;
      state->immutable_count--;
      return 1;
  }

  int release_mutable(BorrowState *state) {
      if (!state->mutable_active) return 0;
      state->mutable_active = 0;
      return 1;
  }
solution_explanation: |
  This simulates Rust's core borrowing invariant: you can have either multiple
  readers (&T) or one writer (&mut T), but not both. In Rust, the compiler
  enforces this at compile time through lifetime analysis. This C version does
  the same checks at runtime, returning failure for invalid borrow attempts.
