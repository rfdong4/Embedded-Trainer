id: embedded_rust_borrow_checker
topic_id: embedded_rust
title: "Borrow Checker Simulation"
difficulty: advanced
description: |
  Simulate Rust's borrow checker rules in C. Rust enforces that at any time,
  a value can have either:
  - Multiple immutable borrows (&T), OR
  - Exactly one mutable borrow (&mut T)
  But never both simultaneously.

  Implement a borrow tracker using a BorrowState struct:

  typedef struct {
      int immutable_count;   // number of active immutable borrows
      int mutable_active;    // 1 if a mutable borrow is active, 0 otherwise
  } BorrowState;

  Functions:
  - borrow_init: Initialize the borrow state (zero borrows)
  - borrow_immutable: Try to take an immutable borrow. Succeeds (returns 1)
    if no mutable borrow is active. Fails (returns 0) otherwise.
  - borrow_mutable: Try to take a mutable borrow. Succeeds (returns 1) only
    if no borrows of any kind are active. Fails (returns 0) otherwise.
  - release_immutable: Release one immutable borrow. Returns 1 on success,
    0 if no immutable borrows are active.
  - release_mutable: Release the mutable borrow. Returns 1 on success,
    0 if no mutable borrow is active.
function_signature: |
  void borrow_init(BorrowState *state);
  int borrow_immutable(BorrowState *state);
  int borrow_mutable(BorrowState *state);
  int release_immutable(BorrowState *state);
  int release_mutable(BorrowState *state);
