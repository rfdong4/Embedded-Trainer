  - "Read only works in input state (1), write only in output state (2)"
xp: 40
time_limit: 5
solution: |
  #include <stdint.h>

  /* Simulates Rust's typestate pattern:
   * - In Rust, Pin<Unconfigured>, Pin<Input>, Pin<Output> are different types
   * - Calling set_high() on Pin<Input> is a compile-time error
   * - Here we use runtime state checks to simulate the same safety */

  typedef struct {
      uint8_t pin_number;
      uint8_t state;   /* 0=unconfigured, 1=input, 2=output */
  } GpioPin;

  void pin_init(GpioPin *pin, uint8_t pin_number) {
      pin->pin_number = pin_number;
      pin->state = 0;
  }

  int pin_configure_input(GpioPin *pin) {
      if (pin->state != 0) return 0;
      pin->state = 1;
      return 1;
  }

  int pin_configure_output(GpioPin *pin) {
      if (pin->state != 0) return 0;
      pin->state = 2;
      return 1;
  }

  int pin_read(const GpioPin *pin) {
      if (pin->state != 1) return -1;
      return (int)pin->pin_number;
  }

  int pin_write(GpioPin *pin, uint8_t value) {
      if (pin->state != 2) return 0;
      (void)value;
      return 1;
  }
solution_explanation: |
  This simulates the typestate pattern used in Rust embedded HALs. In Rust,
  Pin<Unconfigured>, Pin<Input>, and Pin<Output> are different types, so
  calling set_high() on an input pin is a compile-time error. The into_input()
  method consumes the unconfigured pin and returns an input pin, making the
  state transition explicit and verified by the compiler.
