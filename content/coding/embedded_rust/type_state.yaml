id: embedded_rust_type_state
topic_id: embedded_rust
title: "Typestate Pattern for GPIO Pin"
difficulty: intermediate
description: |
  Simulate Rust's typestate pattern for a GPIO pin in C. In Rust, the type
  system encodes hardware state so that invalid operations are compile-time
  errors (e.g., you cannot set_high on an input pin).

  Implement a pin state machine using a GpioPin struct:

  typedef struct {
      uint8_t pin_number;
      uint8_t state;   // 0=unconfigured, 1=input, 2=output
  } GpioPin;

  Functions:
  - pin_init: Create an unconfigured pin (state=0)
  - pin_configure_input: Transition from unconfigured (0) to input (1).
    Returns 1 on success, 0 if not unconfigured.
  - pin_configure_output: Transition from unconfigured (0) to output (2).
    Returns 1 on success, 0 if not unconfigured.
  - pin_read: Read the pin (returns pin_number as dummy value).
    Only valid in input state (1). Returns -1 if wrong state.
  - pin_write: Write to the pin (no-op, returns 1).
    Only valid in output state (2). Returns 0 if wrong state.

  In Rust, these invalid transitions would be prevented at compile time via
  the type system rather than runtime checks.
function_signature: |
  void pin_init(GpioPin *pin, uint8_t pin_number);
  int pin_configure_input(GpioPin *pin);
  int pin_configure_output(GpioPin *pin);
  int pin_read(const GpioPin *pin);
  int pin_write(GpioPin *pin, uint8_t value);
