id: rtos_message_queue
topic_id: rtos_basics
title: "Fixed-Size Message Queue"
difficulty: intermediate
description: |
  Implement a fixed-size message queue using a circular buffer of uint32_t
  messages. The queue has a maximum capacity defined by MAX_QUEUE_SIZE (8).

  - mq_init: Initialize the queue to empty state.
  - mq_send: Add a message to the back of the queue. Returns 1 on success,
    0 if the queue is full.
  - mq_receive: Remove and return the message at the front of the queue via
    an output pointer. Returns 1 on success, 0 if the queue is empty.
  - mq_is_full: Returns 1 if the queue is full, 0 otherwise.
  - mq_is_empty: Returns 1 if the queue is empty, 0 otherwise.
  - mq_count: Returns the number of messages currently in the queue.

  Use a struct with a fixed-size buffer, head index, tail index, and count.
function_signature: "void mq_init(MsgQueue *q) / int mq_send(MsgQueue *q, uint32_t msg) / int mq_receive(MsgQueue *q, uint32_t *msg) / int mq_is_full(MsgQueue *q) / int mq_is_empty(MsgQueue *q) / uint8_t mq_count(MsgQueue *q)"
