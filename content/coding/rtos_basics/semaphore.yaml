id: rtos_semaphore
topic_id: rtos_basics
title: "Counting Semaphore"
difficulty: beginner
description: |
  Implement a simple counting semaphore with wait (acquire) and signal (release)
  operations.

  - sem_init: Initialize semaphore with a given count and max value
  - sem_wait: Decrement count if > 0 (acquire). Return 1 if acquired, 0 if count was 0.
  - sem_signal: Increment count if < max (release). Return 1 if released, 0 if at max.

  Use a struct with: uint8_t count, uint8_t max_count.
function_signature: "void sem_init(Semaphore *sem, uint8_t initial, uint8_t max_val); uint8_t sem_wait(Semaphore *sem); uint8_t sem_signal(Semaphore *sem)"
skeleton_code: |
