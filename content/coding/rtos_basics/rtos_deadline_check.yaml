test_harness: "rtos_deadline_check_tests/test_main.c"
expected_output: "rtos_deadline_check_tests/expected_output.txt"
hints:
  - "Use powf(2.0f, 1.0f/n) to compute 2^(1/n). Cast integers to float before dividing."
  - "For n=1, the bound is 1.0. For n=2, approximately 0.828. For n=3, approximately 0.780."
