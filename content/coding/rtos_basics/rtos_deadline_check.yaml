id: rtos_deadline_check
topic_id: rtos_basics
title: "RMS Schedulability Test"
difficulty: advanced
description: |
  Implement a Rate Monotonic Scheduling (RMS) utilization bound test to
  determine if a set of periodic tasks is guaranteed schedulable.

  Given an array of tasks, each with a period and worst-case execution time
  (WCET), compute the total CPU utilization: U = sum(WCET_i / Period_i).

  Then compare against the Liu & Layland utilization bound:
    bound = n * (2^(1/n) - 1)
  where n is the number of tasks.

  - compute_utilization: Return the total utilization as a float.
  - compute_rm_bound: Return the RM bound for n tasks as a float.
  - is_schedulable: Return 1 if utilization <= bound, 0 otherwise.

  Use the provided Task struct with uint32_t period and uint32_t wcet fields.
function_signature: "float compute_utilization(Task *tasks, int n) / float compute_rm_bound(int n) / int is_schedulable(Task *tasks, int n)"
