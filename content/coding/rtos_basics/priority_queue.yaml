id: rtos_priority_queue
topic_id: rtos_basics
title: "Priority Queue Insert"
difficulty: beginner
description: |
  Implement a function that inserts a priority value into a sorted array
  (ascending order, lower number = higher priority). The array acts as a
  simple priority queue.

  Insert the value in the correct sorted position. If the queue is full
  (size == max_size), do not insert. Update *size on successful insertion.
function_signature: "void pq_insert(uint8_t *queue, uint8_t *size, uint8_t priority, uint8_t max_size)"
skeleton_code: |
  #include <stdint.h>

  void pq_insert(uint8_t *queue, uint8_t *size, uint8_t priority, uint8_t max_size) {
      // TODO: implement
  }
test_harness: "priority_queue_tests/test_main.c"
expected_output: "priority_queue_tests/expected_output.txt"
hints:
  - "Find the insertion point by scanning until you find a value >= priority."
  - "Shift elements right from the end to make room, then insert."
xp: 35
time_limit: 5
solution: |
  #include <stdint.h>

  void pq_insert(uint8_t *queue, uint8_t *size, uint8_t priority, uint8_t max_size) {
      if (*size >= max_size) return;
      uint8_t i = *size;
      while (i > 0 && queue[i - 1] > priority) {
          queue[i] = queue[i - 1];
          i--;
      }
      queue[i] = priority;
      (*size)++;
  }
solution_explanation: |
  The function performs an insertion-sort-style insert into the sorted array.
  Starting from the end, it shifts elements right while they are greater than
  the new priority value, then places the value at the correct position. If
  the queue is full, the insertion is skipped.
