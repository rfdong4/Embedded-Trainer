id: rtos_mutex
topic_id: rtos_basics
title: "Mutex with Owner Tracking"
difficulty: intermediate
description: |
  Implement a mutex that tracks which task currently owns it.

  - mutex_init: Initialize the mutex to unlocked state (owner = 0).
  - mutex_lock: Attempt to acquire the mutex for a given task_id.
    Returns 1 if acquired successfully, 0 if already locked by another task.
    If the same task tries to lock again, return 0 (non-recursive mutex).
  - mutex_unlock: Release the mutex for a given task_id. Returns 1 if
    successfully unlocked, 0 if the caller is not the owner or mutex is
    already unlocked.
  - mutex_try_lock: Same as lock but intended for polling usage. Returns 1
    if acquired, 0 otherwise.
  - mutex_get_owner: Returns the task_id of the current owner, or 0 if unlocked.

  Use a struct with: uint8_t locked, uint8_t owner.
function_signature: "void mutex_init(Mutex *m) / int mutex_lock(Mutex *m, uint8_t task_id) / int mutex_unlock(Mutex *m, uint8_t task_id) / int mutex_try_lock(Mutex *m, uint8_t task_id) / uint8_t mutex_get_owner(Mutex *m)"
