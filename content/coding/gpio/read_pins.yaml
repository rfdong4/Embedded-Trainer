id: gpio_read_pins
topic_id: gpio
title: "Read Multiple GPIO Pin States"
difficulty: beginner
description: |
  Implement a function that reads the states of specific GPIO pins from a 32-bit
  port value and returns them packed into a bitmask. The pins to read are
  specified in an array.

  For each pin in the pins array, if that pin is high in port_value, set the
  corresponding bit (by index) in the result. Bit 0 of the result corresponds
  to pins[0], bit 1 to pins[1], etc.

  For example, if port_value = 0x0A (pins 1 and 3 high), pins = {1, 3}, count = 2,
  the result should be 0x03 (both bits set).
function_signature: "uint8_t read_pins(uint32_t port_value, uint8_t *pins, uint8_t count)"
skeleton_code: |
  #include <stdint.h>

  uint8_t read_pins(uint32_t port_value, uint8_t *pins, uint8_t count) {
      // TODO: implement
  }
test_harness: "read_pins_tests/test_main.c"
expected_output: "read_pins_tests/expected_output.txt"
hints:
  - "Loop through the pins array and check each pin in port_value."
  - "If pin is set, OR the result with (1 << index) where index is the loop counter."
xp: 30
time_limit: 5
