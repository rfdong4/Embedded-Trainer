  uint32_t toggle_pattern(uint32_t port_reg, uint32_t pattern) {
      // TODO: implement
  }
test_harness: "toggle_pattern_tests/test_main.c"
expected_output: "toggle_pattern_tests/expected_output.txt"
hints:
  - "XOR toggles bits: a ^ b flips every bit where b is 1."
  - "This is a one-line solution using the XOR operator."
xp: 25
time_limit: 5
