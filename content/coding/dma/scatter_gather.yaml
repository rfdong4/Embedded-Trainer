id: dma_scatter_gather
topic_id: dma
title: "Implement Scatter-Gather List Builder"
difficulty: intermediate
description: |
  Implement a function that builds a linked list of DMA descriptors for
  scatter-gather transfers.

  Given an array of dma_descriptor_t and a count, link them together by
  setting each descriptor's 'next' field to point to the next descriptor
  in the array. The last descriptor's 'next' should be 0 (end of chain).

  The function should also set the 'valid' field of each descriptor to 1.

  Parameters:
  - descriptors: pointer to array of dma_descriptor_t
  - count: number of descriptors in the array

  Return the number of descriptors linked (should equal count).

  The dma_descriptor_t struct has: src_addr, dst_addr, transfer_count,
  control, next (all uint32_t), and valid (uint8_t).
function_signature: "uint32_t build_sg_list(dma_descriptor_t *descriptors, uint32_t count)"
