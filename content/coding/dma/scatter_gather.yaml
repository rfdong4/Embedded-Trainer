      uint8_t valid;
  } dma_descriptor_t;

  uint32_t build_sg_list(dma_descriptor_t *descriptors, uint32_t count) {
      // TODO: implement
  }
test_harness: "scatter_gather_tests/test_main.c"
expected_output: "scatter_gather_tests/expected_output.txt"
hints:
  - "Iterate through the array and set each descriptor's next to the address of the following one."
  - "Use (uint32_t)(uintptr_t)&descriptors[i+1] to get the address as a uint32_t."
  - "The last descriptor should have next = 0."
xp: 30
time_limit: 5
solution: |
  #include <stdint.h>

  typedef struct {
      uint32_t src_addr;
      uint32_t dst_addr;
      uint32_t transfer_count;
      uint32_t control;
      uint32_t next;
      uint8_t valid;
  } dma_descriptor_t;

  uint32_t build_sg_list(dma_descriptor_t *descriptors, uint32_t count) {
      if (count == 0) return 0;
      for (uint32_t i = 0; i < count; i++) {
          descriptors[i].valid = 1;
          if (i < count - 1) {
              descriptors[i].next = (uint32_t)(uintptr_t)&descriptors[i + 1];
          } else {
              descriptors[i].next = 0;
          }
      }
      return count;
  }
solution_explanation: |
  The function iterates through each descriptor, marks it as valid, and sets
  its next pointer to the address of the following descriptor. The last
  descriptor gets next = 0 to terminate the chain. This mirrors how real
  scatter-gather DMA controllers traverse linked lists of descriptors.
