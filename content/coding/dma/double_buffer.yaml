id: dma_double_buffer
topic_id: dma
title: "Implement Double Buffering Logic"
difficulty: intermediate
description: |
  Implement double-buffering management for DMA transfers. The system uses two
  buffers that alternate: while DMA fills one, the application processes the other.

  Implement three functions:

  1. db_init: Initialize the double buffer state. Set active_buffer to 0,
     buffer_ready[0] and buffer_ready[1] to 0.
  2. db_swap: Called when a DMA transfer completes. Mark the current active
     buffer as ready for processing, then switch to the other buffer.
     Return the index of the buffer that is now ready for processing (the old active).
  3. db_get_ready_buffer: Return the index of a buffer that is ready for processing
     (check buffer 0 first, then buffer 1). Mark it as not ready. Return -1 if none ready.

  The double_buffer_t struct has: active_buffer (uint8_t), buffer_ready[2] (uint8_t array).
function_signature: "void db_init(double_buffer_t *db); uint8_t db_swap(double_buffer_t *db); int db_get_ready_buffer(double_buffer_t *db)"
skeleton_code: |
  #include <stdint.h>

  typedef struct {
      uint8_t active_buffer;
      uint8_t buffer_ready[2];
  } double_buffer_t;

  void db_init(double_buffer_t *db) {
      // TODO: implement
  }

  uint8_t db_swap(double_buffer_t *db) {
      // TODO: implement
  }

  int db_get_ready_buffer(double_buffer_t *db) {
      // TODO: implement
