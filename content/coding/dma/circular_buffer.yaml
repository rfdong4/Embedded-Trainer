solution: |
  #include <stdint.h>

  typedef struct {
      uint8_t *buffer;
      uint32_t size;
      uint32_t head;
      uint32_t tail;
      uint32_t count;
  } circular_buffer_t;

  void cb_init(circular_buffer_t *cb, uint8_t *buf, uint32_t size) {
      cb->buffer = buf;
      cb->size = size;
      cb->head = 0;
      cb->tail = 0;
      cb->count = 0;
  }

  int cb_write(circular_buffer_t *cb, uint8_t data) {
      if (cb->count >= cb->size) {
          return 0;
      }
      cb->buffer[cb->head] = data;
      cb->head = (cb->head + 1) % cb->size;
      cb->count++;
      return 1;
  }

  int cb_read(circular_buffer_t *cb, uint8_t *data) {
      if (cb->count == 0) {
          return 0;
      }
      *data = cb->buffer[cb->tail];
      cb->tail = (cb->tail + 1) % cb->size;
      cb->count--;
      return 1;
  }
solution_explanation: |
  The circular buffer uses head (write pointer) and tail (read pointer) indices
  that wrap around using modulo arithmetic. A count field tracks how many items
  are in the buffer, making it easy to check for full (count == size) and empty
  (count == 0) conditions.
