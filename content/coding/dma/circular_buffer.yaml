id: dma_circular_buffer
topic_id: dma
title: "Implement a Circular Buffer"
difficulty: beginner
description: |
  Implement a circular buffer (ring buffer) commonly used with DMA transfers.

  You need to implement three functions:

  1. cb_init: Initialize the circular buffer with the given backing array and size.
  2. cb_write: Write one byte to the buffer. Return 1 on success, 0 if buffer is full.
  3. cb_read: Read one byte from the buffer into *data. Return 1 on success, 0 if buffer is empty.

  The circular_buffer_t struct has: buffer (uint8_t*), size (uint32_t), head (uint32_t),
  tail (uint32_t), and count (uint32_t).
