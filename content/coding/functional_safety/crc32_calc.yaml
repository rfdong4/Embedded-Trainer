id: functional_safety_crc32_calc
topic_id: functional_safety
title: "CRC-32 Calculation"
difficulty: intermediate
description: |
  Implement a CRC-32 calculation for data integrity verification, commonly used
  in functional safety to detect corruption of flash memory, configuration data,
  and communication packets.

  - crc32_calc: Compute the CRC-32 of a byte array using the standard polynomial
    0xEDB88320 (bit-reversed representation of 0x04C11DB7). Process each byte
    bit-by-bit. Initialize the CRC to 0xFFFFFFFF and return the inverted result.

  Algorithm for each byte:
    1. XOR the byte into the lowest 8 bits of the CRC
    2. For each of the 8 bits: if the LSB is set, shift right and XOR with
       the polynomial; otherwise just shift right
    3. After all bytes, return ~crc (bitwise NOT)
function_signature: "uint32_t crc32_calc(const uint8_t *data, uint32_t length)"
skeleton_code: |
  #include <stdint.h>

  uint32_t crc32_calc(const uint8_t *data, uint32_t length) {
      // TODO: implement CRC-32 with polynomial 0xEDB88320
      // Initialize crc to 0xFFFFFFFF
      // For each byte, XOR into crc, then process 8 bits
      // Return ~crc
  }
test_harness: "crc32_calc_tests/test_main.c"
expected_output: "crc32_calc_tests/expected_output.txt"
hints:
  - "Start with crc = 0xFFFFFFFF. For each byte: crc ^= data[i]."
  - "For each of 8 bits: if (crc & 1) crc = (crc >> 1) ^ 0xEDB88320; else crc >>= 1;"
  - "Return ~crc at the end."
xp: 40
time_limit: 10
solution: |
  #include <stdint.h>

  uint32_t crc32_calc(const uint8_t *data, uint32_t length) {
      uint32_t crc = 0xFFFFFFFF;
      for (uint32_t i = 0; i < length; i++) {
          crc ^= data[i];
          for (int bit = 0; bit < 8; bit++) {
              if (crc & 1) {
                  crc = (crc >> 1) ^ 0xEDB88320;
              } else {
                  crc >>= 1;
              }
          }
      }
      return ~crc;
  }
solution_explanation: |
  The standard CRC-32 algorithm initializes the CRC register to all 1s. For each
  byte, it XORs the byte into the least significant 8 bits of the CRC. Then for
  each bit, if the LSB is 1, it shifts right and XORs with the reflected polynomial
  0xEDB88320. After processing all bytes, the result is inverted. This produces
  the same CRC-32 used in Ethernet, ZIP, PNG, and many embedded protocols.
