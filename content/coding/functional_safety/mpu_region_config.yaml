id: functional_safety_mpu_region_config
topic_id: functional_safety
title: "MPU Region Configuration"
difficulty: intermediate
description: |
  Implement functions to configure Memory Protection Unit (MPU) regions.
  The MPU divides memory into regions, each with a base address, size, and
  access permissions encoded as a bitmask.

  - mpu_region_init: Initialize a region with base address, size, and permissions.
    The base address must be aligned to the region size (base % size == 0).
    Return 1 on success, 0 if alignment is invalid.
  - mpu_check_access: Given a region and a requested permission mask, return 1
    if ALL requested permissions are granted, 0 otherwise.
  - mpu_contains_address: Return 1 if the given address falls within the region
    (base <= addr < base + size), 0 otherwise.

  Permission bits:
    MPU_READ    = 0x01
    MPU_WRITE   = 0x02
    MPU_EXECUTE = 0x04
function_signature: "uint8_t mpu_region_init(MPU_Region *region, uint32_t base, uint32_t size, uint8_t permissions); uint8_t mpu_check_access(const MPU_Region *region, uint8_t requested); uint8_t mpu_contains_address(const MPU_Region *region, uint32_t addr)"
