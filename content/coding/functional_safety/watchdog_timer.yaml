solution: |
  #include <stdint.h>

  typedef struct {
      uint32_t counter;
      uint32_t timeout;
      uint8_t expired;
  } Watchdog;

  void wdt_init(Watchdog *wdt, uint32_t timeout) {
      wdt->counter = 0;
      wdt->timeout = timeout;
      wdt->expired = 0;
  }

  void wdt_feed(Watchdog *wdt) {
      wdt->counter = 0;
      wdt->expired = 0;
  }

  uint8_t wdt_check(Watchdog *wdt, uint32_t elapsed) {
      wdt->counter += elapsed;
      if (wdt->counter >= wdt->timeout) {
          wdt->expired = 1;
          return 1;
      }
      return 0;
  }
solution_explanation: |
  The watchdog maintains a counter that accumulates elapsed time. wdt_init sets
  the timeout and clears the counter. wdt_feed resets the counter to zero,
  preventing expiration. wdt_check adds the elapsed time to the counter and
  compares it against the timeout. If the counter reaches or exceeds the timeout,
  the watchdog is marked as expired and returns 1.
