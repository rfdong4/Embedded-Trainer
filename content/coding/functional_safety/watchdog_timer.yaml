id: functional_safety_watchdog_timer
topic_id: functional_safety
title: "Software Watchdog Timer"
difficulty: beginner
description: |
  Implement a software watchdog timer that detects if the application has
  stopped servicing (feeding) it within a timeout period.

  - wdt_init: Initialize the watchdog with a timeout value and set it as not expired.
  - wdt_feed: Reset the watchdog counter to zero (kick/service the watchdog).
  - wdt_check: Increment the counter by a given elapsed time. If the counter
    reaches or exceeds the timeout, mark the watchdog as expired and return 1.
    Otherwise return 0.

  Use a struct with: uint32_t counter, uint32_t timeout, uint8_t expired.
