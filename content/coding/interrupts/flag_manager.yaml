id: int_flag_manager
topic_id: interrupts
title: "Interrupt Flag Manager"
difficulty: beginner
description: |
  Implement three functions to manage interrupt flags in a 32-bit register:

  - set_flag: Set a specific flag bit, return updated flags
  - clear_flag: Clear a specific flag bit, return updated flags
  - check_flag: Return 1 if the flag is set, 0 otherwise

  Flag numbers range from 0 to 31.
function_signature: "uint32_t set_flag(uint32_t flags, uint8_t flag_num); uint32_t clear_flag(uint32_t flags, uint8_t flag_num); uint8_t check_flag(uint32_t flags, uint8_t flag_num)"
