test_harness: "irq_mask_manager_tests/test_main.c"
expected_output: "irq_mask_manager_tests/expected_output.txt"
hints:
  - "Use irq_save_top as the index for the next push. Push: stack[top] = mask; top++. Pop: top--; mask = stack[top]."
  - "Boundary check: save returns 0 if top >= IRQ_SAVE_DEPTH; restore returns 0 if top <= 0."
