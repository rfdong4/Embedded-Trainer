id: irq_mask_manager
topic_id: interrupts
title: "IRQ Mask Save/Restore Manager"
difficulty: intermediate
description: |
  Implement an interrupt mask manager with save/restore capability, commonly
  used in embedded systems to implement critical sections. The manager wraps
  a 32-bit interrupt mask register where each bit enables/disables one IRQ.

  Unlike simple enable/disable, this manager maintains a save stack so that
  nested critical sections can save the current mask, modify it, and later
  restore the previous state.

  Implement:
  - irq_mgr_init: Initialize the manager. Mask starts at 0 (all disabled),
    save stack depth at 0.
  - irq_mgr_enable: Enable IRQ n (set bit n). If n >= 32, do nothing.
  - irq_mgr_disable: Disable IRQ n (clear bit n). If n >= 32, do nothing.
  - irq_mgr_is_enabled: Return 1 if IRQ n is enabled, 0 otherwise.
  - irq_mgr_save: Push the current mask onto the save stack (max depth 8).
    Return 1 on success, 0 if stack is full.
  - irq_mgr_restore: Pop the top saved mask and make it the current mask.
    Return 1 on success, 0 if stack is empty.
function_signature: "void irq_mgr_init(void) / void irq_mgr_enable(uint8_t n) / void irq_mgr_disable(uint8_t n) / int irq_mgr_is_enabled(uint8_t n) / int irq_mgr_save(void) / int irq_mgr_restore(void)"
