id: int_priority_encode
topic_id: interrupts
title: "Find Highest Priority Interrupt"
difficulty: beginner
description: |
  Implement a function that finds the highest priority (lowest numbered) active
  interrupt from a pending interrupt mask. Each bit in the 32-bit mask represents
  one interrupt source. Bit 0 is highest priority.

  Return the bit position of the lowest set bit, or -1 if no interrupts are pending.
function_signature: "int8_t highest_priority(uint32_t pending_mask)"
