id: wireless_crc16
topic_id: wireless
title: "CRC-16 Calculation"
difficulty: intermediate
description: |
  Implement a CRC-16/CCITT-FALSE calculation over a byte array.

  The CRC-16/CCITT-FALSE algorithm uses:
  - Polynomial: 0x1021
  - Initial value: 0xFFFF
  - No final XOR

  For each byte in the data:
  1. XOR the byte into the upper 8 bits of the CRC (crc ^= (byte << 8))
  2. For each of the 8 bits:
     a. If the MSB of the 16-bit CRC is set, shift left by 1 and XOR with 0x1021
     b. Otherwise, just shift left by 1
  3. Mask the result to 16 bits after each shift

  Parameters:
  - data: pointer to the byte array
  - len: number of bytes

  Return the 16-bit CRC value.
function_signature: "uint16_t crc16(const uint8_t *data, uint32_t len)"
skeleton_code: |
  #include <stdint.h>

  uint16_t crc16(const uint8_t *data, uint32_t len) {
      // TODO: implement CRC-16/CCITT-FALSE
  }
test_harness: "crc16_tests/test_main.c"
expected_output: "crc16_tests/expected_output.txt"
hints:
  - "Initialize crc to 0xFFFF."
  - "For each byte, XOR it into the high byte of CRC: crc ^= (uint16_t)data[i] << 8."
  - "For each of the 8 bits, check if bit 15 is set before shifting."
xp: 35
time_limit: 5
solution: |
  #include <stdint.h>

  uint16_t crc16(const uint8_t *data, uint32_t len) {
      uint16_t crc = 0xFFFF;
      for (uint32_t i = 0; i < len; i++) {
          crc ^= (uint16_t)data[i] << 8;
          for (int j = 0; j < 8; j++) {
              if (crc & 0x8000) {
                  crc = (crc << 1) ^ 0x1021;
              } else {
                  crc = crc << 1;
              }
              crc &= 0xFFFF;
          }
      }
      return crc;
  }
solution_explanation: |
  The CRC-16/CCITT-FALSE algorithm processes data bit by bit. Each input byte
  is XORed into the top of the CRC register. Then for each bit, if the MSB is
  set, the register is shifted left and XORed with the polynomial. This
  implements polynomial division in GF(2), which is the mathematical basis of
  CRC error detection.
