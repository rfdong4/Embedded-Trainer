id: spi_clock_div
topic_id: spi
title: "Calculate SPI Clock Divider"
difficulty: beginner
description: |
  Implement a function that calculates the minimum clock divider needed to
  keep the SPI clock at or below the maximum allowed frequency.

  The SPI clock frequency is: spi_clk = sys_clock / divider

  Find the smallest power-of-2 divider (1, 2, 4, 8, 16, 32, 64, 128) such
  that sys_clock / divider <= max_spi_clock. Return the divider value.
  If no divider is small enough, return 128.
function_signature: "uint8_t spi_clock_div(uint32_t sys_clock, uint32_t max_spi_clock)"
