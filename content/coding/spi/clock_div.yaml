id: spi_clock_div
topic_id: spi
title: "Calculate SPI Clock Divider"
difficulty: beginner
description: |
  Implement a function that calculates the minimum clock divider needed to
  keep the SPI clock at or below the maximum allowed frequency.

  The SPI clock frequency is: spi_clk = sys_clock / divider

  Find the smallest power-of-2 divider (1, 2, 4, 8, 16, 32, 64, 128) such
  that sys_clock / divider <= max_spi_clock. Return the divider value.
  If no divider is small enough, return 128.
function_signature: "uint8_t spi_clock_div(uint32_t sys_clock, uint32_t max_spi_clock)"
skeleton_code: |
  #include <stdint.h>

  uint8_t spi_clock_div(uint32_t sys_clock, uint32_t max_spi_clock) {
      // TODO: implement
  }
test_harness: "clock_div_tests/test_main.c"
expected_output: "clock_div_tests/expected_output.txt"
hints:
  - "Start with divider=1 and double it until sys_clock/divider <= max_spi_clock."
  - "Powers of 2: 1, 2, 4, 8, 16, 32, 64, 128. Stop at 128 maximum."
xp: 30
time_limit: 5
solution: |
  #include <stdint.h>

  uint8_t spi_clock_div(uint32_t sys_clock, uint32_t max_spi_clock) {
      uint8_t div = 1;
      while (div < 128 && sys_clock / div > max_spi_clock) {
          div *= 2;
      }
      return div;
  }
solution_explanation: |
  The function starts with divider 1 and doubles it until sys_clock/divider is
  at or below max_spi_clock. It stops at 128 as the maximum allowed divider.
  This finds the smallest power-of-2 divider that keeps the SPI clock within
  the specified limit.
