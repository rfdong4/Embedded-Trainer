  }
test_harness: "spi_mode_config_tests/test_main.c"
expected_output: "spi_mode_config_tests/expected_output.txt"
hints:
  - "CPOL is the upper bit of the mode (mode >> 1) and CPHA is the lower bit (mode & 1)."
  - "For valid modes (0-3), the config byte is simply the mode value itself with CPOL in bit 1 and CPHA in bit 0."
