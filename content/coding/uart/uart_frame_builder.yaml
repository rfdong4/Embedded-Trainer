id: uart_frame_builder
topic_id: uart
title: "Build a UART Frame"
difficulty: intermediate
description: |
  Build a complete UART frame from a data byte and parity configuration.

  The frame format (LSB first in the returned uint16_t):
    Bit 0:      Start bit (always 0)
    Bits 1-8:   Data bits (LSB of data byte at bit 1)
    Bit 9:      Parity bit (if parity is enabled)
    Bit 10:     Stop bit (always 1)

  The parity parameter controls parity:
    0 = no parity (bit 9 is the stop bit instead, frame is 10 bits)
    1 = even parity (set parity bit so total 1s in data+parity is even)
    2 = odd parity (set parity bit so total 1s in data+parity is odd)

  When parity is disabled (parity=0), the stop bit is at bit 9 and the
  frame is only 10 bits wide. When parity is enabled, the stop bit is
  at bit 10 and the frame is 11 bits wide.

  Return the frame packed into a uint16_t.
function_signature: "uint16_t uart_build_frame(uint8_t data, uint8_t parity)"
skeleton_code: |
  #include <stdint.h>

  uint16_t uart_build_frame(uint8_t data, uint8_t parity) {
      // TODO: implement
  }
test_harness: "uart_frame_builder_tests/test_main.c"
expected_output: "uart_frame_builder_tests/expected_output.txt"
hints:
  - "Start by shifting data left by 1 to place it at bits 1-8. Bit 0 (start) stays 0."
  - "Count the number of 1-bits in data using a loop or XOR folding."
  - "For even parity, set the parity bit if the count of 1s is odd. For odd parity, set it if even."
  - "When parity=0, place the stop bit at bit 9. When parity!=0, place it at bit 10."
xp: 30
time_limit: 5
solution: |
  #include <stdint.h>

  uint16_t uart_build_frame(uint8_t data, uint8_t parity) {
      uint16_t frame = 0;
      // Bit 0 is start bit (0)
      // Bits 1-8 are data
      frame |= ((uint16_t)data << 1);

      if (parity == 0) {
          // No parity: stop bit at bit 9
          frame |= (1 << 9);
      } else {
          // Count 1-bits in data
          uint8_t p = data;
          p ^= (p >> 4);
          p ^= (p >> 2);
          p ^= (p >> 1);
          uint8_t ones_odd = p & 1;
          if (parity == 1) {
              // Even parity: set parity bit if odd number of 1s
              if (ones_odd) frame |= (1 << 9);
          } else {
              // Odd parity: set parity bit if even number of 1s
              if (!ones_odd) frame |= (1 << 9);
          }
          // Stop bit at bit 10
          frame |= (1 << 10);
      }
      return frame;
  }
solution_explanation: |
  The frame starts with a 0 start bit and places data at bits 1-8. When
  parity is disabled, the stop bit goes at bit 9 for a 10-bit frame. When
  parity is enabled, XOR folding determines the 1-bit count: even parity
  sets the parity bit if the count is odd, odd parity sets it if even, and
  the stop bit is placed at bit 10.
