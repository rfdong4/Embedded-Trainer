id: uart_fifo
topic_id: uart
title: "UART TX FIFO Buffer"
difficulty: intermediate
description: |
  Implement a simple UART TX FIFO (First-In, First-Out) circular buffer
  with a fixed capacity of 8 bytes. You must implement four functions:

  - uart_fifo_init(): Reset the FIFO to an empty state.
  - uart_fifo_push(data): Add a byte to the FIFO. Return 0 on success,
    or -1 if the FIFO is full.
  - uart_fifo_pop(): Remove and return the oldest byte from the FIFO.
    Return -1 if the FIFO is empty.
  - uart_fifo_count(): Return the number of bytes currently stored.

  Use the provided static global variables for the buffer and state.
  The buffer must behave as a circular (ring) buffer: when the head or
  tail index reaches FIFO_SIZE, it wraps around to 0.
