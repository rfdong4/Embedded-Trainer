id: uart_parity_calc
topic_id: uart
title: "Calculate Even Parity Bit"
difficulty: beginner
description: |
  Implement a function that calculates the even parity bit for a byte of data.
  Even parity means the total number of 1-bits (including the parity bit)
  should be even.

  Return 1 if the data byte has an odd number of 1-bits (parity bit needed to
  make even), or 0 if the data already has an even number of 1-bits.
function_signature: "uint8_t even_parity(uint8_t data)"
