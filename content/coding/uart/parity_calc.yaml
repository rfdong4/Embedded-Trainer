test_harness: "parity_calc_tests/test_main.c"
expected_output: "parity_calc_tests/expected_output.txt"
hints:
  - "Count the number of set bits, or XOR all bits together."
  - "You can XOR the byte with itself shifted: data ^= (data >> 4); data ^= (data >> 2); data ^= (data >> 1); return data & 1;"
