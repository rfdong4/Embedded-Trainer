id: reg_bitband
topic_id: registers
title: "Bit-Band Address Calculator"
difficulty: intermediate
description: |
  Simulate Cortex-M bit-banding for the peripheral region.

  Given a peripheral register address and a bit number (0-31), calculate
  the corresponding bit-band alias address.

  The peripheral region starts at 0x40000000 and the bit-band alias
  region starts at 0x42000000.

  Formula:
    byte_offset = periph_addr - 0x40000000
    alias = 0x42000000 + (byte_offset * 32) + (bit_num * 4)
