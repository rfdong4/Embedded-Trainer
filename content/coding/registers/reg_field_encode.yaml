id: registers_reg_field_encode
topic_id: registers
title: "Register Field Encoder"
difficulty: advanced
description: |
  Encode multiple fields into a single 32-bit configuration register.

  Given an array of field descriptors and the number of fields, combine them
  into a single register value. Each field is described by 3 consecutive bytes
  in the array:
    - fields[i*3 + 0] = start_bit (0-31)
    - fields[i*3 + 1] = width (1-8 bits)
    - fields[i*3 + 2] = value

  Before placing each value, mask it to the specified width (discard excess bits).
  Then shift it left by start_bit and OR it into the result.
function_signature: "uint32_t encode_register(const uint8_t* fields, uint8_t num_fields)"
skeleton_code: |
  #include <stdint.h>

  uint32_t encode_register(const uint8_t* fields, uint8_t num_fields) {
      // TODO: implement
      return 0;
  }
test_harness: "reg_field_encode_tests/test_main.c"
expected_output: "reg_field_encode_tests/expected_output.txt"
hints:
  - "To mask a value to width bits: val & ((1 << width) - 1)."
  - "For each field: result |= (masked_value << start_bit)."
xp: 50
time_limit: 5
solution: |
  #include <stdint.h>

  uint32_t encode_register(const uint8_t* fields, uint8_t num_fields) {
      uint32_t result = 0;
      for (uint8_t i = 0; i < num_fields; i++) {
          uint8_t start_bit = fields[i * 3 + 0];
          uint8_t width = fields[i * 3 + 1];
          uint8_t value = fields[i * 3 + 2];
          uint32_t mask = (1U << width) - 1;
          result |= ((uint32_t)(value & mask)) << start_bit;
      }
      return result;
  }
solution_explanation: |
  For each field descriptor, the function extracts the start bit, width, and
  value. It creates a bitmask of the specified width, masks the value to discard
  excess bits, shifts the masked value to the correct position, and ORs it into
  the accumulating result register.
