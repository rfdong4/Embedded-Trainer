id: reg_file
topic_id: registers
title: "Simple Register File"
difficulty: intermediate
description: |
  Implement read and write functions for a simulated register file
  with 8 registers (R0-R7), each 32 bits wide.

  - reg_write: Write a value to a register (0-7)
  - reg_read: Read a value from a register (0-7)

  If the register index is out of range (>7), do nothing (write)
  or return 0 (read).
function_signature: "void reg_write(uint8_t reg, uint32_t value) / uint32_t reg_read(uint8_t reg)"
skeleton_code: |
  #include <stdint.h>

  static uint32_t reg_file[8] = {0};

  void reg_write(uint8_t reg, uint32_t value) {
      // TODO: implement
  }

  uint32_t reg_read(uint8_t reg) {
      // TODO: implement
      return 0;
  }
test_harness: "reg_file_tests/test_main.c"
expected_output: "reg_file_tests/expected_output.txt"
hints:
  - "Check that reg < 8 before accessing the array."
  - "Just assign reg_file[reg] = value for write, return reg_file[reg] for read."
xp: 30
time_limit: 5
