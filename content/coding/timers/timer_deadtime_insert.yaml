test_harness: "timer_deadtime_insert_tests/test_main.c"
expected_output: "timer_deadtime_insert_tests/expected_output.txt"
hints:
  - "Cast to uint32_t before multiplying: on_ticks = ((uint32_t)period * duty_permille) / 1000."
  - "ch1 turns off dead_ticks before the nominal edge. ch2 turns on dead_ticks after it."
  - "Pack the result: ((uint32_t)ch1_compare << 16) | ch2_compare."
