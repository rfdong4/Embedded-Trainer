title: "Calculate PWM Compare Value"
difficulty: beginner
description: |
  Implement a function that calculates the PWM compare (match) value for a
  desired duty cycle percentage. The formula is:

    compare = (period * duty_percent) / 100

  The compare value determines when the PWM output toggles within each period.
