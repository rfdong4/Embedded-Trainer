id: timers_timer_reload
topic_id: timers
title: "Calculate Timer Reload Value"
difficulty: beginner
description: |
  Implement a function that calculates the timer reload value needed to
  generate a specific period. The formula is:

    reload = (clock_freq / prescaler) * desired_period_us / 1000000

  This determines how many timer ticks fit in the desired period.
  Use integer arithmetic (truncation is fine).
function_signature: "uint16_t timer_reload(uint32_t clock_freq, uint16_t prescaler, uint32_t desired_period_us)"
