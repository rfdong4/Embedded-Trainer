id: timer_frequency
topic_id: timers
title: "Calculate Timer Output Frequency"
difficulty: intermediate
description: |
  Calculate the timer overflow/output frequency given the system clock,
  prescaler, and reload value.

  The formula is:
    freq = sys_clk / (prescaler * reload)

  Use integer division (truncate toward zero). The prescaler and reload
  values are guaranteed to be non-zero.

  Be careful with intermediate multiplication: prescaler and reload are
  16-bit values, so their product can exceed 16 bits.
function_signature: "uint32_t timer_overflow_freq(uint32_t sys_clk, uint16_t prescaler, uint16_t reload)"
