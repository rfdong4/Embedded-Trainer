solution: |
  #include <stdint.h>
  #include <stddef.h>

  #define POOL_BLOCK_SIZE 32
  #define POOL_NUM_BLOCKS 8

  static uint8_t pool_memory[POOL_NUM_BLOCKS][POOL_BLOCK_SIZE];
  static uint8_t pool_used[POOL_NUM_BLOCKS];

  void pool_init(void) {
      for (int i = 0; i < POOL_NUM_BLOCKS; i++) {
          pool_used[i] = 0;
      }
  }

  void* pool_alloc(void) {
      for (int i = 0; i < POOL_NUM_BLOCKS; i++) {
          if (!pool_used[i]) {
              pool_used[i] = 1;
              return &pool_memory[i][0];
          }
      }
      return NULL;
  }

  void pool_free(void* ptr) {
      for (int i = 0; i < POOL_NUM_BLOCKS; i++) {
          if (ptr == &pool_memory[i][0]) {
              pool_used[i] = 0;
              return;
          }
      }
  }
solution_explanation: |
  The pool uses a boolean array to track which fixed-size blocks are allocated. pool_init
  clears all entries. pool_alloc scans for the first free block, marks it used, and returns
  its address. pool_free validates the pointer by checking if it matches any block's start
  address before marking it free, safely ignoring invalid pointers.
