  #include <stddef.h>

  #define POOL_BLOCK_SIZE 32
  #define POOL_NUM_BLOCKS 8

  static uint8_t pool_memory[POOL_NUM_BLOCKS][POOL_BLOCK_SIZE];
  static uint8_t pool_used[POOL_NUM_BLOCKS];

  void pool_init(void) {
      // TODO: mark all blocks as free
  }

  void* pool_alloc(void) {
      // TODO: find a free block, mark it used, return pointer (or NULL)
  }

  void pool_free(void* ptr) {
      // TODO: find the block and mark it free; ignore invalid pointers
  }
test_harness: "memory_pool_tests/test_main.c"
