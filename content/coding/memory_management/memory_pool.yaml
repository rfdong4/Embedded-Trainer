id: memory_management_memory_pool
topic_id: memory_management
title: "Fixed-Size Memory Pool Allocator"
difficulty: intermediate
description: |
  Implement a fixed-size memory pool allocator commonly used in embedded systems
  to avoid dynamic memory allocation overhead and fragmentation.

  The pool has 8 blocks, each 32 bytes in size. Implement these functions:
  - pool_init: Initialize the pool, marking all blocks as free.
  - pool_alloc: Allocate and return a pointer to a free block, or NULL if all
    blocks are in use.
  - pool_free: Free a previously allocated block. If the pointer does not belong
    to the pool, do nothing.

  Use static storage for the pool memory and a free/used tracking mechanism
  (e.g., a bitmask or boolean array).
function_signature: "void pool_init(void) / void* pool_alloc(void) / void pool_free(void* ptr)"
skeleton_code: |
