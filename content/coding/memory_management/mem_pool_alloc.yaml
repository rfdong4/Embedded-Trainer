  #include <stddef.h>

  #define POOL_BLOCK_SIZE 64
  #define POOL_NUM_BLOCKS 16

  static uint8_t pool_memory[POOL_NUM_BLOCKS][POOL_BLOCK_SIZE];
  static uint16_t pool_bitmap;  /* bit N = 1 means block N is in use */

