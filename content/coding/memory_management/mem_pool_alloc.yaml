id: mem_pool_alloc
topic_id: memory_management
title: "Bitmap Memory Pool Allocator"
difficulty: intermediate
description: |
  Implement a fixed-size memory pool allocator that uses a bitmap to track
  which blocks are free or allocated. This is a common pattern in embedded
  systems where dynamic allocation (malloc) is avoided.

  The pool has 16 blocks, each 64 bytes. A single uint16_t bitmap tracks
  allocation status: bit N = 1 means block N is in use.

  Implement these functions:
  - pool_init: Initialize the pool, clearing the bitmap (all blocks free).
  - pool_alloc: Find the lowest-numbered free block, mark it used in the
    bitmap, and return a pointer to it. Return NULL if all blocks are used.
  - pool_free: Given a pointer, determine which block it belongs to, and
    clear the corresponding bit. Ignore pointers outside the pool.
  - pool_count_free: Return the number of free blocks remaining.
function_signature: "void pool_init(void) / void* pool_alloc(void) / void pool_free(void* ptr) / int pool_count_free(void)"
skeleton_code: |
