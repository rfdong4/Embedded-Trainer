test_harness: "mem_pool_alloc_tests/test_main.c"
expected_output: "mem_pool_alloc_tests/expected_output.txt"
hints:
  - "To find the lowest free bit, iterate from 0 to 15 and check !(bitmap & (1U << i))."
  - "To get the block index from a pointer, cast to uint8_t* and compute (ptr - &pool_memory[0][0]) / POOL_BLOCK_SIZE."
