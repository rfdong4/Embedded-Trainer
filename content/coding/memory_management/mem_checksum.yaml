  }

  int crc8_verify(const uint8_t *data, uint32_t len, uint8_t expected) {
      // TODO: return 1 if crc8_calc matches expected, 0 otherwise
  }
test_harness: "mem_checksum_tests/test_main.c"
expected_output: "mem_checksum_tests/expected_output.txt"
hints:
  - "Initialize crc = 0. For each byte: crc ^= byte. Then loop 8 times: if (crc & 0x80) crc = (crc << 1) ^ POLY; else crc <<= 1."
  - "Remember to mask the CRC to 8 bits: use uint8_t or mask with 0xFF after shifts."
