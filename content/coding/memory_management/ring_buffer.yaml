solution: |
  #include <stdint.h>

  #define RB_SIZE 8

  typedef struct {
      uint8_t buf[RB_SIZE];
      uint8_t head;
      uint8_t tail;
      uint8_t count;
  } RingBuffer;

  void rb_init(RingBuffer *rb) {
      rb->head = 0;
      rb->tail = 0;
      rb->count = 0;
  }

  uint8_t rb_push(RingBuffer *rb, uint8_t val) {
      if (rb->count >= RB_SIZE) return 0;
      rb->buf[rb->head] = val;
      rb->head = (rb->head + 1) % RB_SIZE;
      rb->count++;
      return 1;
  }

  int16_t rb_pop(RingBuffer *rb) {
      if (rb->count == 0) return -1;
      uint8_t val = rb->buf[rb->tail];
      rb->tail = (rb->tail + 1) % RB_SIZE;
      rb->count--;
      return val;
  }
solution_explanation: |
  The ring buffer uses head for the write position and tail for the read position, both
  advancing with modulo RB_SIZE to wrap around. A count field tracks the number of elements
  to distinguish full from empty states. Push writes at head and advances it; pop reads at
  tail and advances it. Both check count for full/empty conditions.
