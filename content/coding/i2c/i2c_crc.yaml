title: "I2C Packet Error Check (PEC)"
difficulty: beginner
description: |
  Implement a simplified Packet Error Code (PEC) calculation for I2C/SMBus.
  For this exercise, compute a simple XOR checksum of all bytes in the data array.

  XOR all bytes together and return the result. This detects single-bit errors
  in transmitted data.
