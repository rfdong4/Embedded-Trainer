      // TODO: implement
  }
test_harness: "i2c_address_tests/test_main.c"
expected_output: "i2c_address_tests/expected_output.txt"
hints:
  - "Shift the 7-bit address left by 1, then OR with the read bit."
  - "Make sure read is masked to 1 bit: (addr_7bit << 1) | (read & 1)."
