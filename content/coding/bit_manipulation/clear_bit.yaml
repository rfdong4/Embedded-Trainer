  uint8_t clear_bit(uint8_t reg, uint8_t bit_pos) {
      // TODO: implement
  }
test_harness: "clear_bit_tests/test_main.c"
expected_output: "clear_bit_tests/expected_output.txt"
hints:
  - "Use the bitwise AND operator (&) with an inverted mask to clear a bit."
  - "Create an inverted mask with ~(1 << bit_pos)."
xp: 25
time_limit: 5
