test_harness: "timer_wheel_tests/test_main.c"
expected_output: "timer_wheel_tests/expected_output.txt"
hints:
  - "Use tick % WHEEL_SIZE to determine the slot index."
  - "timer_add should check if the slot is already occupied (not -1)."
  - "timer_tick should save the timer_id, clear the slot to -1, then return the saved id."
xp: 30
time_limit: 5
solution: |
  #include <stdint.h>

  #define WHEEL_SIZE 8

  typedef struct {
      int8_t slots[WHEEL_SIZE];
  } TimerWheel;

  void timer_wheel_init(TimerWheel *tw) {
      for (int i = 0; i < WHEEL_SIZE; i++) {
          tw->slots[i] = -1;
      }
  }

  uint8_t timer_add(TimerWheel *tw, uint32_t tick, int8_t timer_id) {
      uint32_t slot = tick % WHEEL_SIZE;
      if (tw->slots[slot] != -1) {
          return 0;
      }
      tw->slots[slot] = timer_id;
      return 1;
  }

  int8_t timer_tick(TimerWheel *tw, uint32_t current_tick) {
      uint32_t slot = current_tick % WHEEL_SIZE;
      int8_t id = tw->slots[slot];
      tw->slots[slot] = -1;
      return id;
  }
solution_explanation: |
  The timer wheel maps expiry ticks to slots using modulo. This gives O(1)
  insertion and expiry checking. The simplified version allows one timer per
  slot. Real implementations use linked lists per slot to handle collisions
  and support many more timers than slots.
