id: advanced_rtos_timer_wheel
topic_id: advanced_rtos
title: "Software Timer Wheel"
difficulty: advanced
description: |
  Implement a simplified timer wheel for scheduling callbacks.

  The timer wheel has a fixed number of slots. Each timer is placed in
  a slot based on its expiry tick modulo the wheel size.

  Implement:
  - `timer_wheel_init`: Initialize the wheel (clear all slots)
  - `timer_add`: Add a timer to expire at a given tick. Store the timer_id
    in the slot at (tick % WHEEL_SIZE). Return 1 on success, 0 if slot full.
  - `timer_tick`: Process the current tick. Return the timer_id in the
    current slot (or -1 if empty), and clear the slot.

  Each slot holds at most one timer (simplified).
function_signature: "void timer_wheel_init(TimerWheel *tw); uint8_t timer_add(TimerWheel *tw, uint32_t tick, int8_t timer_id); int8_t timer_tick(TimerWheel *tw, uint32_t current_tick)"
