id: advanced_rtos_priority_inherit
topic_id: advanced_rtos
title: "Priority Inheritance"
difficulty: advanced
description: |
  Implement a simplified priority inheritance mechanism for a mutex.

  When a high-priority task blocks on a mutex held by a lower-priority task,
  the holder's effective priority is temporarily raised to the blocker's priority.

  Implement:
  - `mutex_lock`: Acquire mutex. If already held, record the waiting task and
    boost the holder's effective priority if needed. Return 1 if acquired, 0 if blocked.
  - `mutex_unlock`: Release mutex. Restore the holder's original priority.
  - `get_effective_priority`: Return a task's current effective priority.

  Lower number = higher priority (0 is highest).
function_signature: "uint8_t mutex_lock(PIMutex *m, uint8_t task_id, uint8_t task_prio); void mutex_unlock(PIMutex *m, uint8_t tasks[][2], uint8_t num_tasks); uint8_t get_effective_priority(PIMutex *m, uint8_t tasks[][2], uint8_t task_id, uint8_t num_tasks)"
