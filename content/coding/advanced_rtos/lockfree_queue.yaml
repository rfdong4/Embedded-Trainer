xp: 30
time_limit: 5
solution: |
  #include <stdint.h>

  #define QUEUE_SIZE 8

  typedef struct {
      uint32_t buffer[QUEUE_SIZE];
      uint32_t head;
      uint32_t tail;
  } SPSCQueue;

  void spsc_init(SPSCQueue *q) {
      q->head = 0;
      q->tail = 0;
  }

  uint8_t spsc_push(SPSCQueue *q, uint32_t value) {
      uint32_t next_head = (q->head + 1) % QUEUE_SIZE;
      if (next_head == q->tail) {
          return 0;  /* Full */
      }
      q->buffer[q->head] = value;
      q->head = next_head;
      return 1;
  }

  uint8_t spsc_pop(SPSCQueue *q, uint32_t *out) {
      if (q->head == q->tail) {
          return 0;  /* Empty */
      }
      *out = q->buffer[q->tail];
      q->tail = (q->tail + 1) % QUEUE_SIZE;
      return 1;
  }
solution_explanation: |
  The SPSC queue uses a circular buffer with head (write) and tail (read)
  indices. It's lock-free because head is only written by the producer and
  tail only by the consumer. One slot is sacrificed to distinguish full
  (next_head == tail) from empty (head == tail). This pattern is widely
  used in embedded systems for ISR-to-task communication.
