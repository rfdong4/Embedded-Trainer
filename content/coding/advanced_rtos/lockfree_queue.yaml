id: advanced_rtos_lockfree_queue
topic_id: advanced_rtos
title: "Lock-Free SPSC Queue"
difficulty: advanced
description: |
  Implement a lock-free single-producer single-consumer (SPSC) circular queue.

  This pattern is safe without mutexes when exactly one task writes and
  one task reads, because head and tail are each modified by only one side.

  Implement:
  - `spsc_init`: Initialize the queue
  - `spsc_push`: Add an element. Return 1 on success, 0 if full.
  - `spsc_pop`: Remove an element into *out. Return 1 on success, 0 if empty.

  The queue capacity is QUEUE_SIZE - 1 (one slot wasted to distinguish
  full from empty).
function_signature: "void spsc_init(SPSCQueue *q); uint8_t spsc_push(SPSCQueue *q, uint32_t value); uint8_t spsc_pop(SPSCQueue *q, uint32_t *out)"
