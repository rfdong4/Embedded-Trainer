title: "Fixed-Size Memory Pool"
difficulty: intermediate
description: |
  Implement a fixed-size memory pool allocator. The pool manages a fixed
  number of equal-sized blocks from a pre-allocated buffer.

  Implement three functions:
  - `pool_init`: Initialize the pool with a buffer, block size, and block count
  - `pool_alloc`: Allocate one block, return its pointer (or NULL if full)
  - `pool_free`: Return a block to the pool

  The pool struct is provided. Track which blocks are in use with a bitmask.
