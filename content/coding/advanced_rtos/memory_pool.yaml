solution: |
  #include <stdint.h>
  #include <stddef.h>

  typedef struct {
      uint8_t *buffer;
      uint32_t block_size;
      uint32_t block_count;
      uint32_t used_mask;
  } MemPool;

  void pool_init(MemPool *pool, uint8_t *buffer, uint32_t block_size, uint32_t block_count) {
      pool->buffer = buffer;
      pool->block_size = block_size;
      pool->block_count = block_count;
      pool->used_mask = 0;
  }

  void *pool_alloc(MemPool *pool) {
      for (uint32_t i = 0; i < pool->block_count; i++) {
          if (!(pool->used_mask & (1u << i))) {
              pool->used_mask |= (1u << i);
              return pool->buffer + (i * pool->block_size);
          }
      }
      return NULL;
  }

  void pool_free(MemPool *pool, void *block) {
      uint8_t *ptr = (uint8_t *)block;
      uint32_t offset = ptr - pool->buffer;
      uint32_t index = offset / pool->block_size;
      if (index < pool->block_count) {
          pool->used_mask &= ~(1u << index);
      }
  }
solution_explanation: |
  The pool tracks block usage with a bitmask. pool_alloc scans for the
  first zero bit (free block), sets it, and returns the block address.
  pool_free calculates the block index from the pointer offset and clears
  the corresponding bit. This O(n) scan is acceptable for small pools
  typical in embedded systems (usually <= 32 blocks).
