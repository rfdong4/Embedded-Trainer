    title: "RTOS Concepts: Tasks and Scheduling"
    estimated_minutes: 6
    content: |
      # RTOS Concepts: Tasks and Scheduling

      A Real-Time Operating System (RTOS) manages multiple tasks running
      "simultaneously" on a single CPU by rapidly switching between them.

      ## What is a Task?

      A task (or thread) is an independent unit of execution with its own:
      - Stack
      - Program counter (current instruction)
      - Priority
      - State (running, ready, blocked, suspended)

          // FreeRTOS task creation
          xTaskCreate(
              vMyTask,        // Task function
              "MyTask",       // Name (debug)
              128,            // Stack size in words
              NULL,           // Parameter
              2,              // Priority (higher = more urgent)
              &xTaskHandle    // Handle (optional)
          );

          void vMyTask(void *pvParameters) {
              for (;;) {
                  // Task code
                  vTaskDelay(pdMS_TO_TICKS(100));  // Block for 100ms
              }
          }

      ## Scheduler Types

      **Preemptive**: The scheduler can interrupt a running task at any time
      to run a higher-priority task. Most RTOSes default to this.

      **Cooperative**: Tasks must voluntarily yield the CPU. Simpler but
      a misbehaving task can starve all others.

      ## Task States

          RUNNING → (preempted or yields) → READY
          RUNNING → (waits for resource) → BLOCKED
          BLOCKED → (resource available)  → READY
          READY   → (scheduler selects)   → RUNNING

      ## Priority Inversion

      A high-priority task blocks waiting for a resource held by a low-priority task,
      while a medium-priority task runs instead. Solution: priority inheritance.

