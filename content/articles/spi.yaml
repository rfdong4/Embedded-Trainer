    title: "SPI Protocol Fundamentals"
    estimated_minutes: 5
    content: |
      # SPI Protocol Fundamentals

      SPI (Serial Peripheral Interface) is a synchronous serial protocol with a
      shared clock. It's faster than UART and I2C, and used for ADCs, flash
      memory, displays, and SD cards.

      ## SPI Signals

      | Signal | Direction | Description |
      |--------|-----------|-------------|
      | SCLK   | Master → Slave | Serial clock |
      | MOSI   | Master → Slave | Master Out Slave In |
      | MISO   | Slave → Master | Master In Slave Out |
      | CS/NSS | Master → Slave | Chip Select (active low) |

      Multiple slaves share SCLK, MOSI, MISO but each has its own CS pin.

      ## Full-Duplex Transfer

      SPI simultaneously sends and receives — every clock cycle shifts one bit
      out on MOSI and one bit in on MISO. An 8-bit transfer always produces
      an 8-bit result (which may be a dummy value).

          uint8_t spi_transfer(uint8_t data) {
              SPI1->DR = data;
              while (!(SPI1->SR & SPI_SR_RXNE)) { }
              return SPI1->DR;
          }

      ## CPOL and CPHA (Clock Modes)

      Four modes defined by clock polarity (CPOL) and clock phase (CPHA):

      | Mode | CPOL | CPHA | Clock idle | Sample on |
      |------|------|------|------------|-----------|
      | 0    | 0    | 0    | LOW        | Rising edge |
      | 1    | 0    | 1    | LOW        | Falling edge |
      | 2    | 1    | 0    | HIGH       | Falling edge |
      | 3    | 1    | 1    | HIGH       | Rising edge |

      Mode 0 is most common. Always check your device's datasheet.

      ## Chip Select

      Pull CS low before transfer, then high after:

          GPIOA->ODR &= ~(1 << CS_PIN);   // Assert CS (active low)
          spi_transfer(command);
          spi_transfer(data);
          GPIOA->ODR |= (1 << CS_PIN);    // Deassert CS

      ## SPI Init (STM32 SPI1, Mode 0, Master)

          RCC->APB2ENR |= RCC_APB2ENR_SPI1EN;

          SPI1->CR1 = SPI_CR1_MSTR       // Master mode
                    | SPI_CR1_BR_1       // Clock = F_PCLK/8
                    | SPI_CR1_SSM        // Software slave management
                    | SPI_CR1_SSI;       // Internal slave select high

          SPI1->CR1 |= SPI_CR1_SPE;      // Enable SPI
