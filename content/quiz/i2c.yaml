topic_id: i2c
topic_name: "I2C Communication"
questions:
  - id: i2c_q01
    type: mcq
    difficulty: beginner
    text: "How many signal lines does the I2C bus use?"
    options:
      - "A) 1 (DATA)"
      - "B) 2 (SDA and SCL)"
      - "C) 3 (SDA, SCL, and CS)"
      - "D) 4 (SDA, SCL, VCC, GND)"
    correct: "B"
    explanation: "I2C uses only two signal lines: SDA (Serial Data) and SCL (Serial Clock). Both lines are open-drain and require external pull-up resistors. Multiple masters and slaves can share these two lines."
    tags: [i2c, signal_lines, basics]
    xp: 10

  - id: i2c_q02
    type: mcq
    difficulty: beginner
    text: "What does the master send first after the START condition in a standard 7-bit address I2C transaction?"
    options:
      - "A) The data byte"
      - "B) A 7-bit slave address followed by a read/write bit"
      - "C) A clock synchronization pulse"
      - "D) An acknowledgment bit"
    correct: "B"
    explanation: "After generating the START condition (SDA goes low while SCL is high), the master sends a 7-bit slave address (MSB first) followed by the R/W bit (0=write, 1=read). The addressed slave responds with an ACK bit."
    tags: [start_condition, addressing, rw_bit]
    xp: 10

  - id: i2c_q03
    type: true_false
    difficulty: beginner
    text: "I2C uses open-drain outputs with pull-up resistors, which means any device can pull the bus line low but relies on the pull-up to return it high."
    options: ["True", "False"]
    correct: "True"
    explanation: "Open-drain means devices can only actively drive the line low. When released, the external pull-up resistor pulls the line high. This wired-AND behavior prevents bus contention and enables multi-master operation and clock stretching."
    tags: [open_drain, pull_up, wired_and]
    xp: 10

  - id: i2c_q04
    type: mcq
    difficulty: intermediate
    text: "What is an ACK (acknowledge) in I2C communication?"
    options:
      - "A) A high pulse on SDA during the 9th clock cycle"
      - "B) A low pulse on SDA during the 9th clock cycle, pulled by the receiver"
      - "C) A clock pulse generated by the slave"
      - "D) A repeated START condition"
    correct: "B"
    explanation: "After each 8-bit byte transfer, the receiver pulls SDA low during the 9th SCL clock cycle to signal ACK (acknowledgment). If SDA remains high (NACK), it indicates the receiver did not acknowledge, either because no device is present or the transfer should end."
    tags: [ack, nack, acknowledgment]
    xp: 15

  - id: i2c_q05
    type: mcq
    difficulty: intermediate
    text: "What is clock stretching in I2C?"
    options:
      - "A) Increasing the clock frequency during a transfer"
      - "B) A slave holding SCL low to pause the transfer until it is ready"
      - "C) The master extending the clock high period"
      - "D) Stretching the pull-up resistor value"
    correct: "B"
    explanation: "Clock stretching allows a slow slave to hold the SCL line low after receiving a byte, pausing the communication until it has processed the data. The master must check that SCL has been released before generating the next clock pulse."
    tags: [clock_stretching, slave_pacing]
    xp: 15

  - id: i2c_q06
    type: mcq
    difficulty: intermediate
    text: "What is the purpose of a repeated START condition in I2C?"
    options:
      - "A) To reset the bus after an error"
      - "B) To change the transfer direction or address a different slave without releasing the bus"
      - "C) To increase the clock speed"
      - "D) To switch from 7-bit to 10-bit addressing"
    correct: "B"
    explanation: "A repeated START (Sr) is issued by the master without first generating a STOP condition. This is commonly used to write a register address and then read data back from the same slave in a single atomic transaction, preventing another master from taking the bus."
    tags: [repeated_start, combined_transfer, atomic]
    xp: 15

  - id: i2c_q07
    type: mcq
    difficulty: intermediate
    text: "Standard I2C supports 7-bit addressing. How many unique slave addresses are practically available?"
    options:
      - "A) 128"
      - "B) 127"
      - "C) 112"
      - "D) 256"
    correct: "C"
    explanation: "With 7 bits, there are 128 possible addresses (0-127). However, 16 addresses are reserved by the I2C specification: 0x00-0x07 and 0x78-0x7F are reserved for special purposes (general call, 10-bit addressing, etc.). This leaves 112 usable addresses."
    tags: [addressing, reserved_addresses, 7bit]
    xp: 15

  - id: i2c_q08
    type: mcq
    difficulty: advanced
    text: "In 10-bit I2C addressing, how is the slave address transmitted?"
    options:
      - "A) As a single 10-bit value in the first byte after START"
      - "B) As two bytes: the first byte contains 11110 plus the two MSBs of the address and R/W, the second byte contains the remaining 8 bits"
      - "C) As a 7-bit address with a 3-bit extension in the data field"
      - "D) Using a special 10-bit header frame before the standard 7-bit address"
    correct: "B"
    explanation: "10-bit addressing uses a two-byte sequence. The first byte starts with 11110 (reserved pattern), followed by the 2 MSBs of the 10-bit address and the R/W bit. The second byte contains the remaining 8 bits. The slave ACKs after each byte."
    tags: [10bit_addressing, address_format]
    xp: 25
